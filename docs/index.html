<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nivaldo Beirão — Professional Portfolio</title>
  <meta name="description" content="Static portfolio to practice HTML5, CSS3 and JavaScript with accessibility and responsiveness." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dark" data-lang="en">
  <header class="topbar" role="banner">
    <div class="controls">
      <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" aria-pressed="true" title="Toggle theme">
        <span id="themeIcon" aria-hidden="true">🌙</span>
      </button>

      <label for="langSelect" class="visually-hidden">Select language</label>
      <select id="langSelect" aria-label="Select language">
        <option value="en">English (EN)</option>
        <option value="pt-BR">Português (PT-BR)</option>
        <option value="es-ES">Español (ES)</option>
      </select>
    </div>
  </header>

  <main class="layout" role="main">
    <aside class="card profile" aria-labelledby="profileName">
      <img id="avatar" class="avatar" src="public/profile.png" alt="Profile photo" />
      <h1 id="profileName" class="name">Name</h1>
      <p id="job" class="job">Job</p>
      <p id="location" class="meta">Location</p>
      <p id="contact" class="meta">Contact</p>

      <nav class="accordion" aria-label="Profile sections">
        <button id="btnSkills" class="accordion-btn" data-target="skills" aria-expanded="false">Skills</button>
        <div id="skills" class="panel" hidden tabindex="-1"></div>

        <button id="btnLanguages" class="accordion-btn" data-target="languages" aria-expanded="false">Languages</button>
        <div id="languages" class="panel" hidden tabindex="-1"></div>

        <button id="btnPortfolio" class="accordion-btn" data-target="portfolio" aria-expanded="false">Portfolio</button>
        <div id="portfolio" class="panel" hidden tabindex="-1"></div>

        <button id="btnExperience" class="accordion-btn" data-target="experience" aria-expanded="false">Professional Experience</button>
        <div id="experience" class="panel" hidden tabindex="-1"></div>
      </nav>
    </aside>

    <section class="content" aria-live="polite">
      <header class="hero" id="hero">
        <p id="intro">Intro text</p>
      </header>

      <section id="projects" class="projects" aria-labelledby="projectsTitle">
        <h2 id="projectsTitle">Projects</h2>
        <ul id="projectsList" class="project-list" aria-live="polite"></ul>
      </section>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <small>&copy; <span id="year"></span> <span id="footerName"></span></small>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
